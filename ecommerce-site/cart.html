<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Shopping Cart – Cali Clear</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="components/assets/css/components.css">

  <style>
    /* Cart Styles */
    .cart-container {
      max-width: 1200px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h1.cart-title {
      text-align: center;
      font-size: 32px;
      margin-bottom: 30px;
      color: #ff6f61;
    }

    .cart-table {
      width: 100%;
      border-collapse: collapse;
    }

    .cart-table th, .cart-table td {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    .cart-table th {
      background-color: #f9f9f9;
      font-weight: 600;
    }

    .cart-product img {
      width: 80px;
      border-radius: 8px;
      margin-right: 10px;
      vertical-align: middle;
    }

    .quantity-input {
      width: 60px;
      padding: 5px;
      text-align: center;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .remove-btn {
      background-color: #ff4d4d;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .remove-btn:hover {
      background-color: #e63939;
    }

    .cart-summary {
      max-width: 400px;
      margin-left: auto;
      margin-top: 30px;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 10px;
      background: #fff;
    }

    .cart-summary h3 {
      margin-bottom: 20px;
      color: #ff6f61;
    }

    .cart-summary p {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .checkout-btn {
      display: block;
      width: 100%;
      padding: 12px;
      text-align: center;
      background-color: #ff6f61;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
    }

    .checkout-btn:hover {
      background-color: #e65c50;
    }

    @media (max-width: 768px) {
      .cart-table th, .cart-table td {
        font-size: 14px;
        padding: 10px;
      }

      .cart-product img {
        width: 60px;
      }
    }
  </style>
</head>
<body>

  <!-- Toast container -->
  <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
  <script src="assets/js/toast.js"></script>

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>
  <script>
    fetch('components/navbar.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('navbar-placeholder').innerHTML = data;
        if (typeof updateAuthUI === 'function') {
          updateAuthUI();
        }
        if (typeof setupNavbarToggle === 'function') {
          setupNavbarToggle();
        }
      });
  </script>

  <!-- Cart JS - loads first -->
  <script src="assets/js/cart.js"></script>
  
  <!-- Initialize cart after navbar and cart.js are loaded -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Wait for cart.js to be ready
      function initCart() {
        if (typeof loadCart === 'function') {
          console.log('[CART] Initializing cart...');
          loadCart();
        } else {
          console.log('[CART] Waiting for cart.js to load...');
          setTimeout(initCart, 50);
        }
      }
      // Start initialization after a small delay to ensure all scripts are loaded
      setTimeout(initCart, 100);
    });
  </script>

  <!-- Cart Container -->
  <div class="cart-container">
    <h1 class="cart-title">Shopping Cart</h1>

    <table class="cart-table" id="cart-table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Total</th>
          <th>Remove</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="5">Your cart is empty. Add products to see them here.</td></tr>
      </tbody>
    </table>

    <div class="cart-summary" id="cart-summary">
      <h3>Cart Summary</h3>
      <p><span>Subtotal:</span> <span id="subtotal">$0.00</span></p>
      <p><span>Tax (10%):</span> <span id="tax">$0.00</span></p>
      <p><strong>Total:</strong> <strong id="total">$0.00</strong></p>
      <button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('components/footer.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
        // Initialize chat after footer loads
        setTimeout(() => {
          const bubble = document.getElementById('chat-bubble');
          const panel = document.getElementById('chat-panel');
          const input = document.getElementById('chat-input');
          const messages = document.getElementById('chat-messages');
          
          if (bubble && panel && input && messages) {
            bubble.addEventListener('click', () => {
              panel.classList.toggle('hidden');
              if (!panel.classList.contains('hidden')) {
                input.focus();
              }
            });
            
            input.addEventListener('keydown', e => {
              if (e.key !== 'Enter') return;
              const text = e.target.value.trim();
              if (!text) return;
              messages.innerHTML += `<div class="user-msg">${text}</div>`;
              e.target.value = '';
              let reply = "Sorry, I didn't understand that. Type \"agent\" to contact us.";
              const lc = text.toLowerCase();
              if (lc.includes('return')) reply = 'You can return items within 30 days. Check our FAQ for details.';
              else if (lc.includes('shipping')) reply = 'Standard shipping takes 5–7 business days.';
              else if (lc.includes('order')) reply = 'Your order is being processed. Use the tracking page with your order number.';
              else if (lc.includes('agent') || lc.includes('human')) {
                reply = 'Click here to email support: <a href="mailto:support@caliclear.shop">support@caliclear.shop</a>';
              }
              messages.innerHTML += `<div class="bot-msg">${reply}</div>`;
              messages.scrollTop = messages.scrollHeight;
            });
          }
        }, 100);
      });
  </script>
</body>
</html>
