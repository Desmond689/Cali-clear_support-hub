<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>Cali Clear - Home</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="components/assets/css/components.css">

<!-- JS for navbar toggle - load first -->
<script src="assets/js/main.js"></script>
<script src="assets/js/toast.js"></script>

<!-- Socket.IO for real-time chat -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
/* ===== Body ===== */
body {
  font-family: 'Poppins', sans-serif;
  background-color: #121212;
  color: #e0e0e0;
  margin: 0;
  padding: 0;
}

/* ===== Hero Section ===== */
.hero-home {
  background: url('assets/images/hero/hero1.jpg') center/cover no-repeat;
  height: 500px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.hero-home::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.hero-home h1 {
  position: relative;
  font-size: 48px;
  color: #ff6f61;
  font-weight: bold;
}

.hero-home p {
  position: relative;
  font-size: 18px;
  margin-top: 12px;
  color: #ddd;
  line-height: 1.5;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}

/* ===== Sections ===== */
.section {
  max-width: 1200px;
  margin: 50px auto;
  padding: 0 20px;
}

.section h2 {
  color: #ff6f61;
  margin-bottom: 25px;
}

/* ===== Products Grid ===== */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

.product-card {
  background: #1e1e1e;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
}

.product-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 5px 20px rgba(255, 111, 97, 0.3);
}

.product-card img {
  width: 100%;
  border-radius: 8px;
  margin-bottom: 10px;
}

.product-card h3 {
  font-size: 16px;
  color: #fff;
  margin-bottom: 8px;
}

.product-card p {
  color: #ff6f61;
  font-weight: 600;
  margin-bottom: 12px;
}

.product-card button {
  background: #ff6f61;
  color: #fff;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* ===== Categories ===== */
.categories {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.category-card {
  flex: 1;
  min-width: 200px;
  height: 150px;
  background-size: cover;
  background-position: center;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.category-card h3 {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.7);
}

/* ===== Newsletter ===== */
.newsletter {
  background: #1e1e1e;
  text-align: center;
  padding: 50px 20px;
  border-radius: 10px;
  margin-top: 50px;
}

.newsletter h2 {
  margin-bottom: 20px;
  color: #ff6f61;
}

.newsletter input {
  padding: 12px;
  width: 250px;
  border: none;
  border-radius: 6px;
  margin-right: 10px;
}

.newsletter button {
  padding: 12px 20px;
  background: #ff6f61;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* ===== Toast Container ===== */
#toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
}
</style>
</head>
<body>
<div id="navbar-placeholder"></div>

<section class="hero-home">
  <div class="hero-content">
    <h1>Cali Clear – Premium Products</h1>
    <p>Discover top-quality products with fast shipping and trusted service.</p>
    <a href="shop.html" class="btn btn-lg" style="background:#ff6f61;color:#fff;">Shop Now</a>
  </div>
</section>

<section class="section">
  <h2>Featured Products</h2>
  <div id="products-grid" class="products-grid"></div>
</section>

<div id="footer-placeholder"></div>

<script>
  function loadNavbar() {
    fetch('components/navbar.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('navbar-placeholder').innerHTML = html;
      })
      .catch(err => console.error('Error loading navbar:', err));
  }

  function loadFooterWithChat() {
    fetch('components/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;

        // Ensure chat bootstrap script is loaded and initialized (works for injected footer)
        if (!document.getElementById('chatbot-script')) {
          const s = document.createElement('script');
          s.id = 'chatbot-script';
          s.src = 'assets/js/chatbot.js';
          s.onload = () => { if (typeof initChat === 'function') initChat(); };
          document.body.appendChild(s);
        } else if (typeof initChat === 'function') {
          initChat();
        }
      })
      .catch(err => console.error('Error loading footer:', err));
  }

  document.addEventListener('DOMContentLoaded', function() {
    loadNavbar();
    loadFooterWithChat();
  });
</script>

<!-- Toast -->
<div id="toast-container"></div>
<script src="assets/js/auth.js"></script>
<!-- Products JS (Dynamic Loading) -->
<script src="assets/js/products.js"></script>

</body>
</html>
